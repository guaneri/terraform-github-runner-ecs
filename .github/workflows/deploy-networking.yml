###############################################################################
# Workflow: Deploy networking only (VPC, subnets, NAT gateway, IGW)
#
# Purpose:
# - Run Terraform plan/apply only for module.networking using a separate
#   state file. Use this to test or create networking without touching the
#   main deployment state.
#
# Configuration:
# - All values from GitHub Settings -> Secrets and variables -> Actions
#   (Variables: SHARED_VPC_CIDR, SHARED_NETWORKING_AZS, TF_NETWORKING_STATE_KEY,
#    SHARED_AWS_REGION; Secrets: SHARED_AWS_ACCOUNT_ID, TF_BACKEND_BUCKET, etc.)
# - No hardcoded CIDRs, AZs, or state keys in this file.
###############################################################################

name: Deploy networking only

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action for networking'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - deploy
  # Temporary/CI trigger: allows pre-merge validation from PRs to main.
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-networking.yml'
      - 'modules/networking/**'
      - 'main.tf'
      - 'variables.tf'
      - 'outputs.tf'

jobs:
  terraform-networking:
    name: Terraform networking ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action || 'plan' }}
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    env:
      TF_CLI_ARGS_init: -upgrade
      TF_CLI_ARGS_plan: -input=false

      # Networking: create VPC, subnets, NAT gateway, IGW; all from Variables (no hardcoded values).
      TF_VAR_create_networking: 'true'
      TF_VAR_vpc_cidr: ${{ vars.SHARED_VPC_CIDR }}
      TF_VAR_vpc_additional_cidrs: ${{ vars.SHARED_VPC_ADDITIONAL_CIDRS || '[]' }}
      TF_VAR_networking_azs: ${{ vars.SHARED_NETWORKING_AZS }}
      TF_VAR_aws_region: ${{ vars.SHARED_AWS_REGION }}
      TF_VAR_aws_account_id: ${{ secrets.SHARED_AWS_ACCOUNT_ID }}
      TF_VAR_cluster_name: ${{ vars.SHARED_CLUSTER_NAME || 'nexus-repo' }}
      # Minimal runner_services so root preconditions pass; only module.networking is targeted.
      TF_VAR_runner_services: '{"default":{"github_org":"placeholder","runner_token_ssm_parameter_name":"placeholder"}}'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.SHARED_AWS_ACCOUNT_ID }}:role/${{ secrets.SHARED_AWS_ROLE_NAME }}
          role-duration-seconds: 7200
          aws-region: ${{ vars.SHARED_AWS_REGION }}
          role-session-name: GitHubActions-Networking-${{ github.run_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: Terraform Init
        run: |
          set -euo pipefail
          rm -f terraform.tfstate terraform.tfstate.backup "terraform copy.tfstate" || true
          terraform init -input=false -upgrade -reconfigure \
            -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}" \
            -backend-config="region=${{ vars.SHARED_AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="key=${{ vars.TF_NETWORKING_STATE_KEY }}"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan (networking only)
        if: github.event_name == 'pull_request' || github.event.inputs.action == 'plan' || github.event.inputs.action == 'deploy'
        run: |
          set -euo pipefail
          terraform plan -target=module.networking -out=tfplan

      - name: Terraform Apply (networking only)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy'
        run: terraform apply -auto-approve tfplan
